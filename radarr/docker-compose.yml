---
services:
  radarr:
    image: ghcr.io/linuxserver/radarr:${RADARR_TAG:-latest}
    container_name: radarr
    hostname: radarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID_MEDIA}
      - PGID=${PGID_MEDIA}
    volumes:
      - ${ROOT_DIR}/radarr/config:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${RADARR_PORT:-7878}:7878
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 1.0
    restart: unless-stopped
    networks:
      - arr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:7878/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - diun.enable=true

# Legacy NFS volumes (reference only). Compose uses host bind mounts above;
# mount NFS (or other storage) on the host at these paths as needed.
# volumes:
#   media:
#     driver: local
#     driver_opts:
#       type: "nfs4"
#       o: "addr=${NFS_MEDIA_ADDR},${NFS_MEDIA_OPTS}"
#       device: ":${MEDIA_PATH}"
#
networks:
  arr:
    external: true
