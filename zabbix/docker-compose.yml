---
# Zabbix server + web (nginx) + agent + PostgreSQL. Image tags and DB credentials come from .env (see Zabbix docker docs).
services:
  postgresql-server:
    image: postgres:${POSTGRESQL_IMAGE_TAG:?set POSTGRESQL_IMAGE_TAG in .env}
    container_name: zabbix-postgresql
    hostname: postgresql-server
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - ${ROOT_DIR}/zabbix/postgresql-data:/var/lib/postgresql/data
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - diun.enable=true

  zabbix-server:
    image: "${ZABBIX_SERVER_PGSQL_IMAGE:?set ZABBIX_SERVER_PGSQL_IMAGE}:${ZABBIX_ALPINE_IMAGE_TAG:?set ZABBIX_ALPINE_IMAGE_TAG}${ZABBIX_IMAGE_TAG_POSTFIX:-}"
    container_name: zabbix-server
    hostname: zabbix-server
    restart: unless-stopped
    depends_on:
      - postgresql-server
    environment:
      DB_SERVER_HOST: postgresql-server
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${ZABBIX_SERVER_PORT:-10051}:10051"
    volumes:
      - ${ROOT_DIR}/zabbix/zabbix-server-data:/var/lib/zabbix
      - ${ROOT_DIR}/zabbix/zabbix-snmptraps-data:/var/lib/zabbix/snmptraps
      - ${ROOT_DIR}/zabbix/zabbix-export-data:/var/lib/zabbix/export
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - diun.enable=true

  zabbix-web-nginx-pgsql:
    image: "${ZABBIX_WEB_NGINX_PGSQL_IMAGE:?set ZABBIX_WEB_NGINX_PGSQL_IMAGE}:${ZABBIX_ALPINE_IMAGE_TAG:?set ZABBIX_ALPINE_IMAGE_TAG}${ZABBIX_IMAGE_TAG_POSTFIX:-}"
    container_name: zabbix-web
    hostname: zabbix-web
    restart: unless-stopped
    depends_on:
      - postgresql-server
      - zabbix-server
    environment:
      DB_SERVER_HOST: postgresql-server
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${PHP_TZ:-UTC}
    ports:
      - "${ZABBIX_FRONTEND_PORT:-8080}:8080"
    volumes:
      - ${ROOT_DIR}/zabbix/zabbix-web-data:/usr/share/zabbix
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - diun.enable=true

  zabbix-agent:
    image: "${ZABBIX_AGENT_IMAGE:?set ZABBIX_AGENT_IMAGE}:${ZABBIX_ALPINE_IMAGE_TAG:?set ZABBIX_ALPINE_IMAGE_TAG}${ZABBIX_IMAGE_TAG_POSTFIX:-}"
    container_name: zabbix-agent
    hostname: zabbix-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
    environment:
      ZBX_HOSTNAME: ${ZABBIX_AGENT_HOSTNAME:-zabbix-server}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: "10051"
      ZBX_SERVER_ACTIVE: zabbix-server
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run
    privileged: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - diun.enable=true
