---
services:
  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_TAG:-latest}
    container_name: jellyfin
    hostname: jellyfin
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
    group_add:
      - "${RENDER_GID:-989}"
    volumes:
      - ${JELLYFIN_CONFIG_PATH:-${ROOT_DIR}/jellyfin/config}:/config
      - ${ROOT_DIR}/jellyfin/cache:/cache
      - ${MEDIA_PATH}:/media
    ports:
      - ${JELLYFIN_PORT:-8496}:8096
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    mem_limit: 8g
    mem_reservation: 2g
    cpus: 8.0
    restart: unless-stopped
    networks:
      - arr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:8096/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - diun.enable=true

  jellysearch:
    image: domistyle/jellysearch:${JELLYSEARCH_TAG:-latest}
    container_name: jellyfin-jellysearch
    hostname: jellysearch
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ${JELLYFIN_CONFIG_PATH:-${ROOT_DIR}/jellyfin/config}:/config:ro
    ports:
      - ${JELLYSEARCH_PORT:-5000}:5000
    environment:
      - INDEX_CRON=0 0 0/2 ? * * *
      - MEILI_URL=http://meilisearch.jellyfin_default:7700
      - JELLYFIN_URL=http://jellyfin.arr:8096
    mem_limit: 1g
    mem_reservation: 128m
    cpus: 2.0
    networks:
      - default
      - arr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:${MEILISEARCH_TAG:-v1.9}
    container_name: jellyfin-meilisearch
    hostname: meilisearch
    restart: unless-stopped
    volumes:
      - ${JELLYFIN_MEILISEARCH_DATA:-${ROOT_DIR}/jellyfin/meilisearch}:/meili_data
    ports:
      - ${MEILISEARCH_PORT:-7700}:7700
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:7700/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - diun.enable=true

  jellyfin-exporter:
    image: rebelcore/jellyfin-exporter:${JELLYFIN_EXPORTER_TAG:-latest}
    container_name: jellyfin-exporter
    restart: unless-stopped
    depends_on:
      jellyfin:
        condition: service_healthy
    networks:
      - arr
      - default
    ports:
      - ${JELLYFIN_EXPORTER_PORT:-9594}:9594
    command:
      - "--jellyfin.address=http://jellyfin.arr:8096"
      - "--jellyfin.token=${JELLYFIN_EXPORTER_API}"
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - diun.enable=true

# Legacy NFS volumes (reference only). Compose uses host bind mounts above;
# mount NFS (or other storage) on the host at these paths as needed.
# volumes:
#   media:
#     driver: local
#     driver_opts:
#       type: "nfs4"
#       o: "addr=${NFS_MEDIA_ADDR},${NFS_MEDIA_OPTS}"
#       device: ":${MEDIA_PATH}"
#
networks:
  arr:
    external: true
