---
services:
  node-red:
    image: nodered/node-red:${NODE_RED_TAG:-latest}
    container_name: node-red
    hostname: node-red
    environment:
      - TZ=${TZ}
    ports:
      - ${NODE_RED_PORT:-1880}:1880
    volumes:
      - ${ROOT_DIR}/nodered/data:/data
      - ${ROOT_DIR}/nodered/context:/usr/src/node-red/.node-red/context
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:1880/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - diun.enable=true
