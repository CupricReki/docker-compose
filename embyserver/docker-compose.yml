---
services:
  emby:
    image: linuxserver/emby:${EMBY_TAG:-latest}
    container_name: embyserver
    hostname: embyserver
    environment:
      - TZ=${TZ}
      - PUID=${PUID_MEDIA}
      - PGID=${PGID_MEDIA}
      - GIDLIST=${GIDLIST}
    volumes:
      - ${ROOT_DIR}/embyserver/config:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${EMBY_PORT:-8096}:8096
      - ${EMBY_HTTPS_PORT:-8920}:8920
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    mem_limit: 8g
    mem_reservation: 2g
    cpus: 8.0
    restart: unless-stopped
    networks:
      - arr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:8096/emby/system/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - diun.enable=true

  emby-exporter:
    image: williamclot/emby_exporter:${EMBY_EXPORTER_TAG:-latest}
    container_name: emby-exporter
    restart: unless-stopped
    depends_on:
      emby:
        condition: service_healthy
    command:
      # In-container Emby HTTP port is 8096; EMBY_PORT is only the host mapping.
      - "--emby.addr=http://emby.arr:8096"
      - "--emby.token=${EMBY_EXPORTER_API}"
    ports:
      - ${EMBY_EXPORTER_PORT:-9162}:9162
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.25
    networks:
      - arr
      - default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/bin/emby_exporter", "-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - diun.enable=true

# Legacy NFS volumes (reference only). Compose uses host bind mounts above;
# mount NFS (or other storage) on the host at these paths as needed.
# volumes:
#   media:
#     driver: local
#     driver_opts:
#       type: "nfs4"
#       o: "addr=${NFS_MEDIA_ADDR},${NFS_MEDIA_OPTS}"
#       device: ":${MEDIA_PATH}"
#
networks:
  arr:
    external: true
