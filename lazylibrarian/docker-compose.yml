---
services:
  lazylibrarian:
    image: ghcr.io/linuxserver/lazylibrarian:${LAZYLIBRARIAN_TAG:-latest}
    container_name: lazylibrarian
    hostname: lazylibrarian
    environment:
      - TZ=${TZ}
      - PUID=${PUID_MEDIA}
      - PGID=${PGID_MEDIA}
      - DOCKER_MODS=${LAZYLIBRARIAN_DOCKER_MODS:-linuxserver/calibre-web:calibre|linuxserver/mods:lazylibrarian-ffmpeg}
    volumes:
      - ${ROOT_DIR}/lazylibrarian/config:/config
      - ${LAZYLIBRARIAN_DOWNLOADS_PATH:-${LOCAL_DOWNLOADS}}:/downloads
      - ${BOOKS_PATH}:/books
      - ${AUDIOBOOKS_PATH:-${MEDIA_PATH}/audiobooks}:/audiobooks
    ports:
      - ${LAZYLIBRARIAN_PORT:-5299}:5299
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 2.0
    restart: unless-stopped
    networks:
      - arr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:5299/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - diun.enable=true

