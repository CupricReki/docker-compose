---
version: "2.1"
services:
  lazylibrarian:
    image: ghcr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    environment:
      - PUID=1007
      - PGID=1008
      - TZ=America/Denver
      - DOCKER_MODS=linuxserver/calibre-web:calibre|linuxserver/mods:lazylibrarian-ffmpeg #optional
    volumes:
      - /opt/lazylibrarian:/config
      - /mnt/cache_slow-striped/downloads:/downloads
      - /mnt/media/misc/books:/books
      - /mnt/media/misc/audiobooks:/audiobooks
    ports:
      - 5299:5299
    restart: always
