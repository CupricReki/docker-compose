---
version: "2.1"
services:
  calibre:
    image: ghcr.io/linuxserver/calibre
    container_name: calibre
    environment:
      - PUID=1007
      - PGID=1008
      - TZ=America/Denver
        #- PASSWORD= password
        #- CLI_ARGS= #optional
    volumes:
      - /opt/calibre/config:/config
      - /mnt/media/misc/calibre-library:/calibre-library
      - /opt/uploads:/uploads
    ports:
      - 8780:8080
      - 8781:8081
    restart: unless-stopped
# Legacy NFS volumes (reference only). Compose uses host bind mounts above;
# mount NFS (or other storage) on the host at these paths as needed.
