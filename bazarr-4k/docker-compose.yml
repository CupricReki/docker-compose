---
services:
  bazarr-4k:
    image: lscr.io/linuxserver/bazarr:${BAZARR_4K_TAG:-latest}
    container_name: bazarr-4k
    hostname: bazarr-4k
    environment:
      - TZ=${TZ}
      - PUID=${PUID_MEDIA}
      - PGID=${PGID_MEDIA}
    volumes:
      - ${ROOT_DIR}/bazarr-4k/config:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${BAZARR_4K_PORT:-6768}:6767
    mem_limit: 1g
    mem_reservation: 128m
    cpus: 0.5
    restart: unless-stopped
    networks:
      - arr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl --fail http://localhost:6767 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - diun.enable=true

# Legacy NFS volumes (reference only). Compose uses host bind mounts above;
# mount NFS (or other storage) on the host at these paths as needed.
# volumes:
#   media:
#     driver: local
#     driver_opts:
#       type: "nfs4"
#       o: "addr=${NFS_MEDIA_ADDR},${NFS_MEDIA_OPTS}"
#       device: ":${MEDIA_PATH}"
#
networks:
  arr:
    external: true
