---
services:
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_KUMA_TAG:-1}
    container_name: uptime-kuma
    hostname: uptime-kuma
    environment:
      - TZ=${TZ}
    volumes:
      - ${ROOT_DIR}/uptime-kuma:/app/data
    ports:
      - ${UPTIME_KUMA_PORT:-3001}:3001
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - diun.enable=true
