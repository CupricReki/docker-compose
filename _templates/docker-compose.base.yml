# Docker Compose Best Practices Template
# =======================================
#
# Usage:
#   1. Copy this template to your service directory
#   2. Create a .env file with required variables (see .env.example)
#   3. Create docker-compose.override.yml for machine-specific config
#
# Media: use a host bind mount (path from env, e.g. hosts/<hostname>.env):
#   - ${MEDIA_PATH}:/media
# Mount NFS (or other storage) on the host at MEDIA_PATH; see tp-environment
# host env and global NFS_MEDIA_OPTS for fstab-style options.
#
---
services:
  app:
    image: "${IMAGE}"
    container_name: "${CONTAINER_NAME}"
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config:/config
    restart: unless-stopped
    labels:
      - diun.enable=true

